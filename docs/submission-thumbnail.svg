<svg xmlns="http://www.w3.org/2000/svg" width="1500" height="1000" viewBox="0 0 1500 1000" role="img" aria-labelledby="title desc">
  <title id="title">Foldweave, one verified change across different folder layouts</title>
  <desc id="desc">Sofia and Martin keep the same connected project under different local paths. Foldweave matches the underlying files and links deterministically, then applies one reviewed structure.</desc>
  <rect width="1500" height="1000" fill="#1c1c1e"/>

  <g transform="translate(76 58)">
    <rect width="76" height="76" rx="18" fill="#2c2c2e" stroke="#48484a" stroke-width="2"/>
    <path d="M19 26h15l7 8h18v25H19z" fill="none" stroke="#0a84ff" stroke-width="4" stroke-linejoin="round"/>
    <path d="M25 47l8-7 8 11 8-9 7 5" fill="none" stroke="#64d2ff" stroke-width="4" stroke-linecap="round" stroke-linejoin="round"/>
  </g>
  <text x="174" y="95" fill="#f5f5f7" font-family="-apple-system, BlinkMacSystemFont, 'SF Pro Display', sans-serif" font-size="45" font-weight="650">Foldweave</text>
  <text x="174" y="132" fill="#a1a1a6" font-family="-apple-system, BlinkMacSystemFont, 'SF Pro Text', sans-serif" font-size="24">Change the structure. Keep the connections.</text>

  <text x="76" y="238" fill="#f5f5f7" font-family="-apple-system, BlinkMacSystemFont, 'SF Pro Display', sans-serif" font-size="64" font-weight="700">One verified change across</text>
  <text x="76" y="309" fill="#f5f5f7" font-family="-apple-system, BlinkMacSystemFont, 'SF Pro Display', sans-serif" font-size="64" font-weight="700">different folder layouts.</text>
  <text x="76" y="358" fill="#a1a1a6" font-family="-apple-system, BlinkMacSystemFont, 'SF Pro Text', sans-serif" font-size="29">Plan once with GPT-5.6. Match equivalent copies with deterministic code.</text>

  <g transform="translate(76 414)">
    <rect width="395" height="350" rx="24" fill="#242426" stroke="#48484a" stroke-width="2"/>
    <circle cx="43" cy="45" r="13" fill="#30d158"/>
    <text x="72" y="55" fill="#f5f5f7" font-family="-apple-system, BlinkMacSystemFont, 'SF Pro Display', sans-serif" font-size="34" font-weight="650">Sofia</text>
    <text x="34" y="104" fill="#8e8e93" font-family="-apple-system, BlinkMacSystemFont, 'SF Pro Text', sans-serif" font-size="20">CURRENT PATHS</text>
    <text x="34" y="153" fill="#f5f5f7" font-family="ui-monospace, SFMono-Regular, Menlo, monospace" font-size="22">approved/</text>
    <text x="54" y="190" fill="#d1d1d6" font-family="ui-monospace, SFMono-Regular, Menlo, monospace" font-size="20">Apollo-final-report.pdf</text>
    <text x="34" y="241" fill="#f5f5f7" font-family="ui-monospace, SFMono-Regular, Menlo, monospace" font-size="22">notes/meetings/</text>
    <text x="54" y="278" fill="#d1d1d6" font-family="ui-monospace, SFMono-Regular, Menlo, monospace" font-size="20">Apollo-approval-notes.md</text>
    <rect x="34" y="307" width="206" height="28" rx="14" fill="#303032"/>
    <text x="49" y="328" fill="#30d158" font-family="-apple-system, BlinkMacSystemFont, 'SF Pro Text', sans-serif" font-size="17" font-weight="600">SOURCE UNCHANGED</text>
  </g>

  <g transform="translate(550 414)">
    <rect width="400" height="350" rx="24" fill="#2c2c2e" stroke="#5a5a5e" stroke-width="2"/>
    <rect x="158" y="28" width="84" height="64" rx="16" fill="#333336" stroke="#5a5a5e" stroke-width="2"/>
    <path d="M178 48h14l7 7h22v22h-43z" fill="none" stroke="#0a84ff" stroke-width="3.5" stroke-linejoin="round"/>
    <path d="M184 66l8-7 8 10 8-9 8 6" fill="none" stroke="#64d2ff" stroke-width="3.5" stroke-linecap="round" stroke-linejoin="round"/>
    <text x="200" y="130" text-anchor="middle" fill="#f5f5f7" font-family="-apple-system, BlinkMacSystemFont, 'SF Pro Display', sans-serif" font-size="30" font-weight="650">Foldweave matches</text>
    <g fill="#d1d1d6" font-family="-apple-system, BlinkMacSystemFont, 'SF Pro Text', sans-serif" font-size="22">
      <text x="54" y="181">Exact size + SHA-256</text>
      <text x="54" y="221">Unchanged Markdown bytes</text>
      <text x="54" y="261">Incoming + outgoing links</text>
      <text x="54" y="301">Protected files by exact path</text>
    </g>
    <text x="200" y="334" text-anchor="middle" fill="#ff9f0a" font-family="-apple-system, BlinkMacSystemFont, 'SF Pro Text', sans-serif" font-size="18" font-weight="600">AMBIGUITY BLOCKS. NOTHING IS GUESSED.</text>
  </g>

  <path d="M485 589h48" stroke="#8e8e93" stroke-width="5" stroke-linecap="round"/>
  <path d="M523 575l18 14-18 14" fill="none" stroke="#8e8e93" stroke-width="5" stroke-linecap="round" stroke-linejoin="round"/>
  <path d="M965 589h48" stroke="#8e8e93" stroke-width="5" stroke-linecap="round"/>
  <path d="M1003 575l18 14-18 14" fill="none" stroke="#8e8e93" stroke-width="5" stroke-linecap="round" stroke-linejoin="round"/>

  <g transform="translate(1029 414)">
    <rect width="395" height="350" rx="24" fill="#242426" stroke="#48484a" stroke-width="2"/>
    <circle cx="43" cy="45" r="13" fill="#0a84ff"/>
    <text x="72" y="55" fill="#f5f5f7" font-family="-apple-system, BlinkMacSystemFont, 'SF Pro Display', sans-serif" font-size="34" font-weight="650">Martin</text>
    <text x="34" y="104" fill="#8e8e93" font-family="-apple-system, BlinkMacSystemFont, 'SF Pro Text', sans-serif" font-size="20">DIFFERENT CURRENT PATHS</text>
    <text x="34" y="153" fill="#f5f5f7" font-family="ui-monospace, SFMono-Regular, Menlo, monospace" font-size="22">ready/</text>
    <text x="54" y="190" fill="#d1d1d6" font-family="ui-monospace, SFMono-Regular, Menlo, monospace" font-size="20">report.pdf</text>
    <text x="34" y="241" fill="#f5f5f7" font-family="ui-monospace, SFMono-Regular, Menlo, monospace" font-size="22">conversations/</text>
    <text x="54" y="278" fill="#d1d1d6" font-family="ui-monospace, SFMono-Regular, Menlo, monospace" font-size="20">approval.md</text>
    <rect x="34" y="307" width="232" height="28" rx="14" fill="#303032"/>
    <text x="49" y="328" fill="#64d2ff" font-family="-apple-system, BlinkMacSystemFont, 'SF Pro Text', sans-serif" font-size="17" font-weight="600">NO MODEL CALL REQUIRED</text>
  </g>

  <g transform="translate(76 812)">
    <rect width="1348" height="114" rx="22" fill="#2c2c2e" stroke="#48484a" stroke-width="2"/>
    <g font-family="-apple-system, BlinkMacSystemFont, 'SF Pro Text', sans-serif" font-size="22">
      <text x="43" y="49" fill="#30d158" font-weight="700">24 files</text>
      <text x="43" y="81" fill="#d1d1d6">accounted for</text>
      <text x="350" y="49" fill="#64d2ff" font-weight="700">23 links</text>
      <text x="350" y="81" fill="#d1d1d6">preserved</text>
      <text x="656" y="49" fill="#30d158" font-weight="700">Source</text>
      <text x="656" y="81" fill="#d1d1d6">unchanged</text>
      <text x="941" y="49" fill="#f5f5f7" font-weight="700">Separate result</text>
      <text x="941" y="81" fill="#d1d1d6">verified + reconstructable</text>
    </g>
  </g>
</svg>
