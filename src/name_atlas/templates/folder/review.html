{% extends "folder/base.html" %}
{% block title %}Review structure · Foldweave{% endblock %}
{% block content %}
  <section class="foldweave-review-shell" aria-labelledby="review-title">
    <h1 id="review-title" class="folder-sr-only">Review structure</h1>
    <p class="folder-sr-only">Nothing has been copied yet.</p>
    <div
      id="foldweave-review-root"
      data-job-id="{{ review.job_id }}"
      data-csrf-token="{{ state.csrf_token }}"
      data-journey="{{ review.journey.value }}"
      aria-live="polite"
    >
      <div class="foldweave-review-loading" role="status">Loading preview…</div>
    </div>
    <noscript>Foldweave plan review requires JavaScript in this local application window.</noscript>
  </section>
  <link rel="stylesheet" href="{{ url_for('static', path='/review/review.css') }}?v={{ review_asset_version }}">
  <script type="module" src="{{ url_for('static', path='/review/review.js') }}?v={{ review_asset_version }}"></script>
{% endblock %}
